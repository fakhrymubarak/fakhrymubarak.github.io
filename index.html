<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./icons/Icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent browser from caching this HTML page (Safari fix) -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Resource Hints -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/Icon-192.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/Icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/icons/Icon-512.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/Icon-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/Icon-192.png"
    />

    <!-- Basic SEO -->
    <title>Fakhry Mubarak - Software Engineer</title>
    <meta
      name="description"
      content="Senior Software Engineer at Transjakarta. 4+ years building scalable apps with Android, Flutter, KMM, ReactJS, and Go."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Fakhry Mubarak - Software Engineer" />
    <meta
      property="og:description"
      content="Senior Software Engineer at Transjakarta. 4+ years building scalable apps with Android, Flutter, KMM, ReactJS, and Go."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/avatar.webp" />
    <meta property="og:site_name" content="Fakhry Mubarak Portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_SITE_URL%/" />
    <meta name="twitter:title" content="Fakhry Mubarak - Software Engineer" />
    <meta
      name="twitter:description"
      content="Senior Software Engineer at Transjakarta. 4+ years building scalable apps with Android, Flutter, KMM, ReactJS, and Go."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/avatar.webp" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
